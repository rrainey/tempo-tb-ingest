# Local soak-test configuration (step 16 bench rehearsal).
# Staging/test-data point at the real tempo-testbed trees.

[store]
staging_root = "/home/riley/src/tempo-testbed/device-data"
data_dir = "/home/riley/.local/share/tempo-tb-ingest"

[harvest]
spool_dir = "/home/riley/.local/share/tempo-tb-ingest/spool"

[promote]
test_data_root = "/home/riley/src/tempo-testbed/test-data"

[detection]
# production defaults; backlog devices harvest on first sighting regardless
rssi_floor_dbm = -75
lost_after_s = 90
absent_after_s = 600

[http]
listen = "127.0.0.1:8080"        # 0.0.0.0:8080 to view from other machines
static_dir = "/home/riley/src/tempo-tb-ingest/dashboard/dist"

[log]
level = "info"
