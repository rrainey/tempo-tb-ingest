# tempo-tb-ingest — example production config (see docs/design.md §3.9)

[adapter]
scan = "hci0"

[detection]
rssi_floor_dbm = -75
lost_after_s = 90
absent_after_s = 600

[harvest]
connect_timeout_s = 20
max_attempts = 5
spool_dir = "/var/lib/tempo-tb-ingest/spool"

[store]
staging_root = "/home/riley/src/tempo-testbed/device-data"
data_dir = "/var/lib/tempo-tb-ingest"

[promote]
test_data_root = "/home/riley/src/tempo-testbed/test-data"

[dropzone]
name = "Texoma (North TX)"
lat_deg = 33.4569
lon_deg = -96.3770
elevation_m = 233.0
timezone = "America/Chicago"

[http]
listen = "0.0.0.0:8080"   # LAN-visible for kiosk/phones; 127.0.0.1 for local only
static_dir = "/home/riley/src/tempo-tb-ingest/dashboard/dist"

[log]
level = "info"
